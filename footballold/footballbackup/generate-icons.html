<!DOCTYPE html>
<html>
<head>
  <title>Generate Football Icons</title>
</head>
<body>
  <h1>Click buttons to download icons</h1>
  <button onclick="downloadIcon(192)">Download icon-192.png</button>
  <button onclick="downloadIcon(512)">Download icon-512.png</button>
  
  <script>
    function downloadIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      
      // Background
      ctx.fillStyle = '#2563eb';
      ctx.fillRect(0, 0, size, size);
      
      // Circle
      ctx.beginPath();
      ctx.arc(size/2, size/2, size * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      
      // Football emoji
      ctx.font = `${size * 0.5}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⚽', size / 2, size / 2 + size * 0.05);
      
      // Download
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `icon-${size}.png`;
        a.click();
        URL.revokeObjectURL(url);
      });
    }
  </script>
</body>
</html>
