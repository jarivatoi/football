<!DOCTYPE html>
<html>
<head>
    <title>Supabase Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .debug-info { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Supabase Debug Tool</h1>
        
        <div class="debug-info">
            <h3>Configuration</h3>
            <div>Supabase URL: <span id="supabase-url">Not loaded</span></div>
            <div>Supabase Key: <span id="supabase-key">Not loaded</span></div>
        </div>
        
        <button onclick="getMatchCounts()">Get Match Counts</button>
        <button onclick="clearOldMatches()">Clear Old Matches</button>
        <button onclick="forceRefresh()">Force Refresh</button>
        
        <div id="results" class="debug-info">
            <h3>Results</h3>
            <div id="results-content">Click a button above to see results</div>
        </div>
    </div>

    <script>
        // Get Supabase configuration from environment
        const SUPABASE_URL = 'https://zaleugflzamrkrfkrcsa.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphbGV1Z2ZsemFtcmtyZmtyY3NhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA2NTE5NjgsImV4cCI6MjA3NjIyNzk2OH0.2UDcqZ-QKujOBIZR9wZT8HiQy4supXvSGVO6p-Y1WRk';
        
        document.getElementById('supabase-url').textContent = SUPABASE_URL;
        document.getElementById('supabase-key').textContent = SUPABASE_ANON_KEY ? 'Loaded' : 'Not found';
        
        // Create Supabase client
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function getMatchCounts() {
            try {
                document.getElementById('results-content').innerHTML = 'Loading...';
                
                // Get total count
                const { count: totalCount, error: countError } = await supabase
                    .from('matches')
                    .select('*', { count: 'exact', head: true });
                
                if (countError) throw countError;
                
                // Get all dates and counts
                const { data: dateData, error: dateError } = await supabase
                    .from('matches')
                    .select('date');
                
                if (dateError) throw dateError;
                
                // Count by date
                const dateCounts = {};
                dateData.forEach(item => {
                    dateCounts[item.date] = (dateCounts[item.date] || 0) + 1;
                });
                
                // Sort dates
                const sortedDates = Object.keys(dateCounts).sort();
                
                let html = `<div>Total matches: ${totalCount || 0}</div>`;
                html += '<div style="margin-top: 10px;"><strong>Matches by date:</strong></div><ul>';
                
                sortedDates.forEach(date => {
                    html += `<li>${date}: ${dateCounts[date]} matches</li>`;
                });
                
                html += '</ul>';
                
                document.getElementById('results-content').innerHTML = html;
                document.getElementById('results').className = 'debug-info success';
            } catch (error) {
                document.getElementById('results-content').innerHTML = `Error: ${error.message}`;
                document.getElementById('results').className = 'debug-info error';
            }
        }
        
        async function clearOldMatches() {
            try {
                document.getElementById('results-content').innerHTML = 'Clearing old matches...';
                
                // Calculate dates
                const today = new Date();
                const sevenDaysAgo = new Date(today);
                sevenDaysAgo.setDate(today.getDate() - 7);
                const sevenDaysAgoString = sevenDaysAgo.toISOString().split('T')[0];
                
                const thirtyDaysFromNow = new Date(today);
                thirtyDaysFromNow.setDate(today.getDate() + 30);
                const thirtyDaysFromNowString = thirtyDaysFromNow.toISOString().split('T')[0];
                
                // Delete old matches
                const { error: oldError } = await supabase
                    .from('matches')
                    .delete()
                    .lt('date', sevenDaysAgoString);
                
                if (oldError) throw oldError;
                
                // Delete future matches
                const { error: futureError } = await supabase
                    .from('matches')
                    .delete()
                    .gt('date', thirtyDaysFromNowString);
                
                if (futureError) throw futureError;
                
                document.getElementById('results-content').innerHTML = 'Old matches cleared successfully!';
                document.getElementById('results').className = 'debug-info success';
            } catch (error) {
                document.getElementById('results-content').innerHTML = `Error: ${error.message}`;
                document.getElementById('results').className = 'debug-info error';
            }
        }
        
        async function forceRefresh() {
            document.getElementById('results-content').innerHTML = 'This would force a refresh in the main app. Please use the Force Refresh button in the main application.';
        }
    </script>
</body>
</html>
